version: "2.4"

services:
  mysql:
    image: mysql:8.4
    container_name: rozledger_mysql
    restart: unless-stopped
    env_file:
      - ./django_backend/.env.docker
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: django_backend/Dockerfile
    container_name: rozledger_web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./django_backend/.env.docker
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/api/health', headers={'X-Forwarded-Proto':'https'}); urllib.request.urlopen(req, timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mysql_data:
