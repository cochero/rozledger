server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rozledger.in;

    ssl_certificate /etc/letsencrypt/live/rozledger.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rozledger.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Proto $scheme;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.rozledger.in rozledger.com www.rozledger.com;

    ssl_certificate /etc/letsencrypt/live/rozledger.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rozledger.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://rozledger.in$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name rozledger.in www.rozledger.in rozledger.com www.rozledger.com;

    return 301 https://rozledger.in$request_uri;
}
